openvla_oft_node:
  ros__parameters:
    # ---- Base VlaBaseNode parameters ----------------------------------------
    inference_frequency_hz: 5.0

    # OpenVLA-OFT uses only the base camera by default.
    use_wrist_camera: false

    joint_names: []

    # chunk_length * action_chunk_dt = planning horizon.
    # 10 steps * 0.02s = 0.2 second horizon (shorter than PI-0.5).
    action_chunk_dt: 0.02

    # ---- OpenVLA-OFT-specific parameters ------------------------------------
    language_instruction: ""

    image_width: 224
    image_height: 224

    # Output action dimension: 6 joint deltas (rad) + 1 gripper delta.
    # NOTE: model outputs DELTAS, not absolute positions. adaptOutput() converts.
    action_dim: 7

    # Number of trajectory points per action chunk.
    chunk_length: 10

    # Scalar multiplier applied to raw model delta output before accumulation.
    # Tune during initial integration to match expected joint velocity range.
    action_scale: 1.0
